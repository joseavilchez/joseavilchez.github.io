<div class="publication-item">

  <!-- Title -->
  <h3 style="margin-bottom:5px;">
    <a href="{{ post.paperurl | default: post.url }}">
      {{ post.title }}
    </a>
  </h3>

  <!-- Venue + Year -->
  <p style="margin:0;">
    {{ post.venue }} · {{ post.date | date: "%Y" }}
  </p>

  <!-- Excerpt -->
  {% if post.excerpt %}
  <p style="margin-top:5px;">
    {{ post.excerpt }}
  </p>
  {% endif %}

  <hr style="margin:15px 0;">

</div>
